<svg xmlns="http://www.w3.org/2000/svg" width="760" height="200" viewBox="0 0 760 200" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">wow-skills logo</title>
  <desc id="desc">A compact brand logo for wow-skills with a stylized W mark and wordmark.</desc>
  <style>
    .wordmark { fill: #111827; }
    .tagline { fill: #64748B; }
    .ink-bar { fill: #111827; }

    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #F8FAFC; }
      .tagline { fill: #CBD5E1; }
      .ink-bar { fill: #E2E8F0; }
    }
  </style>
  <defs>
    <linearGradient id="mark" x1="24" y1="28" x2="154" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="94" y1="60" x2="142" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A3E635"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <g transform="translate(30 24)">
    <rect width="152" height="152" rx="36" fill="url(#mark)"/>
    <path d="M34 48L56 108L76 68L96 108L118 48" stroke="#F8FAFC" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="56" cy="108" r="7" fill="#F8FAFC"/>
    <circle cx="96" cy="108" r="7" fill="#F8FAFC"/>
    <path d="M98 122L112 136L136 104" stroke="url(#accent)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(214 56)">
    <text class="wordmark" x="0" y="56" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="60" font-weight="800">wow-skills</text>
    <text class="tagline" x="4" y="94" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="500">verified skills for code and work</text>
    <rect x="4" y="116" width="64" height="8" rx="4" fill="#22C55E"/>
    <rect x="78" y="116" width="42" height="8" rx="4" fill="#0F766E"/>
    <rect class="ink-bar" x="130" y="116" width="26" height="8" rx="4"/>
  </g>
</svg>
